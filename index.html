<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fengshuo Liu | CV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    p.subtitle {
      margin-top: 0;
      color: #555;
      margin-bottom: 20px;
    }

    .actions {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #d0d7de;
      background: #ffffff;
      color: #222;
    }

    .btn:hover {
      background: #f0f4f8;
    }

    .pdf-frame {
      width: 100%;
      height: 85vh;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
    }

    .note {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #666;
    }

    @media (max-width: 768px) {
      .pdf-frame {
        height: 70vh;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Your Name</h1>
      <p class="subtitle">Updated 2026 Feb</p>

      <div class="actions">
        <a class="btn" href="cv.pdf" target="_blank">Open PDF</a>
        <a class="btn" href="cv.pdf" download>Download CV</a>
      </div>

      <iframe class="pdf-frame" src="cv.pdf"></iframe>

      <p class="note">
        If the PDF preview does not load in your browser, use the “Open PDF” button above.
      </p>
    </div>
  </div>
</body>
</html>
